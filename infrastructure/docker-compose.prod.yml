version: "3.9"

services:
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile.prod
    container_name: trikal-frontend-prod
    ports:
      - "${FRONTEND_PORT:-4310}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8310
    depends_on:
      - backend
    networks:
      - trikal-network

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile.prod
    container_name: trikal-backend-prod
    ports:
      - "${BACKEND_PORT:-8310}:8310"
    env_file:
      - ../apps/backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trikal}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-trikal_db}
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trikal-network

  postgres:
    image: postgres:16-alpine
    container_name: trikal-postgres-prod
    ports:
      - "${POSTGRES_PORT:-5310}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trikal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-trikal_db}
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trikal}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trikal-network

  redis:
    image: redis:7-alpine
    container_name: trikal-redis-prod
    ports:
      - "${REDIS_PORT:-6310}:6379"
    volumes:
      - redis-data-prod:/data
    networks:
      - trikal-network

  nginx:
    image: nginx:alpine
    container_name: trikal-nginx-prod
    ports:
      - "${NGINX_PORT:-9310}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - trikal-network

volumes:
  postgres-data-prod:
  redis-data-prod:

networks:
  trikal-network:
    driver: bridge
