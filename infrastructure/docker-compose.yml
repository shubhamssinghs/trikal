version: "3.9"

services:
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile.dev
    container_name: trikal-frontend
    ports:
      - "${FRONTEND_PORT:-4310}:3000"
    volumes:
      - ../apps/frontend:/app
      - ../packages:/packages
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8310}
    depends_on:
      - backend
    networks:
      - trikal-network

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile.dev
    container_name: trikal-backend
    ports:
      - "${BACKEND_PORT:-8310}:8310"
    volumes:
      - ../apps/backend:/app
    env_file:
      - ../apps/backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trikal}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-trikal_db}
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=${BACKEND_ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trikal-network

  postgres:
    image: postgres:16-alpine
    container_name: trikal-postgres
    ports:
      - "${POSTGRES_PORT:-5310}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trikal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-trikal_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trikal} -d ${POSTGRES_DB:-trikal_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trikal-network

  redis:
    image: redis:7-alpine
    container_name: trikal-redis
    ports:
      - "${REDIS_PORT:-6310}:6379"
    volumes:
      - redis-data:/data
    networks:
      - trikal-network

  # Uncomment when ready to use vector database
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: trikal-qdrant
  #   ports:
  #     - "${QDRANT_HTTP_PORT:-7310}:6333"
  #     - "${QDRANT_GRPC_PORT:-7311}:6334"
  #   volumes:
  #     - qdrant-data:/qdrant/storage
  #   networks:
  #     - trikal-network

volumes:
  postgres-data:
  redis-data:
  # qdrant-data:

networks:
  trikal-network:
    driver: bridge
