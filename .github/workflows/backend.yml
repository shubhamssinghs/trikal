name: Backend

on:
  push:
    paths:
      - 'apps/backend/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trikal
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: trikal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: yezz123/setup-uv@v4
      - run: uv pip install --system -r <(uv pip compile pyproject.toml --extra dev)
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -v
        env:
          DATABASE_URL: postgresql+asyncpg://trikal:testpass@localhost:5432/trikal_test
          SECRET_KEY: test-secret
          ENVIRONMENT: test
